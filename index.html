<script>
    // 3-Tier Asynchronous Data Caching & Fetching Architecture
    const quotationCache = {};
    let activeProfileData = null;
    let currentMode = 'premium'; 

    /**
     * Dynamically loads targeted JSON configuration files from disk
     * Maps to structure: data/[gender]_age[age]_[payTerm].json
     */
    async function fetchQuotationProfile(gender, age, payTerm) {
        const cacheKey = `${gender.toLowerCase()}_age${age}_${payTerm.toLowerCase()}`;
        
        // Return immediately if data partition exists in current application memory instance
        if (quotationCache[cacheKey]) {
            activeProfileData = quotationCache[cacheKey];
            return activeProfileData;
        }

        const targetedPath = `data/${cacheKey}.json`;

        try {
            const response = await fetch(targetedPath);
            if (!response.ok) {
                throw new Error(`Data file not found: ${targetedPath}`);
            }
            const data = await response.json();
            
            // Commit to memory lookup registry
            quotationCache[cacheKey] = data;
            activeProfileData = data;
            return activeProfileData;
        } catch (error) {
            console.error("Critical error mapping external configuration data:", error);
            return null;
        }
    }

    function getSmoothBezierPath(coords) {
        if (coords.length === 0) return "";
        let pathString = `M ${coords[0].x} ${coords[0].y}`;
        for (let i = 0; i < coords.length - 1; i++) {
            const current = coords[i];
            const next = coords[i + 1];
            const controlOffset = (next.x - current.x) * 0.35;
            pathString += ` C ${current.x + controlOffset} ${current.y}, ${next.x - controlOffset} ${next.y}, ${next.x} ${next.y}`;
        }
        return pathString;
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        
        const pSlider = document.getElementById('premium-slider');
        const protSlider = document.getElementById('protection-slider');
        
        if (protSlider) protSlider.disabled = (mode === 'protection');
        if (pSlider) pSlider.disabled = (mode === 'premium');
        
        const activeBtn = document.querySelector(`[onclick="setMode('${mode}')"]`);
        if (activeBtn) activeBtn.classList.add('active');
        
        const premiumGroup = document.getElementById('premium-group');
        const protectionGroup = document.getElementById('protection-group');
        const lockPremium = document.getElementById('lock-icon-premium');
        const lockProtection = document.getElementById('lock-icon-protection');

        if (mode === 'premium') {
            if (premiumGroup) premiumGroup.classList.add('locked');
            if (protectionGroup) protectionGroup.classList.remove('locked');
            if (lockPremium) lockPremium.innerText = '🔒';
            if (lockProtection) lockProtection.innerText = '';
        } else {
            if (protectionGroup) protectionGroup.classList.add('locked');
            if (premiumGroup) premiumGroup.classList.remove('locked');
            if (lockProtection) lockProtection.innerText = '🔒';
            if (lockPremium) lockPremium.innerText = '';
        }
        
        recalibrateSliderBounds(); 
    }

    async function recalibrateSliderBounds() {
        const ageSlider = document.getElementById('age-selector');
        const termSlider = document.getElementById('term-selector');
        const protectionSlider = document.getElementById('protection-slider');
        const premiumSlider = document.getElementById('premium-slider');
        const genderSelector = document.getElementById('gender-selector');

        if (!ageSlider || !termSlider || !protectionSlider || !premiumSlider) return;

        let ageValue = parseInt(ageSlider.value);
        let termKey = termSlider.value;
        let protectionValue = protectionSlider.value; 
        let genderValue = genderSelector ? genderSelector.value : "Male";

        // Query asynchronous 3-tier data pipeline
        const targetTermData = await fetchQuotationProfile(genderValue, ageValue, termKey);
        
        if (!targetTermData || !targetTermData.protectionProfiles || !targetTermData.protectionProfiles[protectionValue]) { 
            renderEmptyState(); 
            return; 
        }
        
        const scenarioData = targetTermData.protectionProfiles[protectionValue];

        if (scenarioData && scenarioData.sustainable70Scenario) {
            const floorPremium = scenarioData.sustainable70Scenario.premiumAmount;
            const pMin = scenarioData.leastPremiumScenario.premiumAmount;
            const pMid = scenarioData.midPremiumScenario ? scenarioData.midPremiumScenario.premiumAmount : pMin;
            const maxPremium = scenarioData.maxPremiumScenario.premiumAmount;
            
            premiumSlider.min = floorPremium;
            premiumSlider.max = maxPremium;
            
            let currentSliderVal = parseInt(premiumSlider.value);
            if (isNaN(currentSliderVal) || currentSliderVal < floorPremium || currentSliderVal > maxPremium) {
                premiumSlider.value = floorPremium; 
            }

            const datalist = document.getElementById('pi-points');
            if (datalist) {
                datalist.innerHTML = ''; 
                const premiumMilestones = [floorPremium, pMin, pMid, maxPremium];
                premiumMilestones.forEach(premium => {
                    const option = document.createElement('option');
                    option.value = premium;
                    datalist.appendChild(option);
                });
            }
        }
        executeSimulationEngine();
    }
              
    async function executeSimulationEngine() {
        const ageSlider = document.getElementById('age-selector');
        const termSlider = document.getElementById('term-selector');
        const protectionSlider = document.getElementById('protection-slider');
        const premiumSlider = document.getElementById('premium-slider');
        const genderSelector = document.getElementById('gender-selector');

        if (!ageSlider || !termSlider || !protectionSlider || !premiumSlider) return;

        let ageValue = parseInt(ageSlider.value);
        let termKey = termSlider.value;
        let simulatedPremium = parseInt(premiumSlider.value);
        let protectionValue = protectionSlider.value;
        let genderValue = genderSelector ? genderSelector.value : "Male";

        // Query asynchronous 3-tier data pipeline
        const targetTermData = await fetchQuotationProfile(genderValue, ageValue, termKey);
        if (!targetTermData || !targetTermData.protectionProfiles || !targetTermData.protectionProfiles[protectionValue]) { 
            renderEmptyState(); 
            return; 
        }

        const scenarioData = targetTermData.protectionProfiles[protectionValue];

        if (!scenarioData || !scenarioData.sustainable70Scenario) {
            renderEmptyState();
            return;
        }

        const pFloor = scenarioData.sustainable70Scenario.premiumAmount;
        const pMin   = scenarioData.leastPremiumScenario.premiumAmount;
        const pMid   = scenarioData.midPremiumScenario ? scenarioData.midPremiumScenario.premiumAmount : pMin;
        const pMax   = scenarioData.maxPremiumScenario.premiumAmount;

        // iPad Touch Snapping Engine
        const premiumMilestones = [pFloor, pMin, pMid, pMax];
        const sliderRange = pMax - pFloor;
        const snapThreshold = sliderRange * 0.025; 
        
        let isExactAnchor = false;

        for (let milestone of premiumMilestones) {
            if (Math.abs(simulatedPremium - milestone) <= snapThreshold) {
                premiumSlider.value = milestone;
                simulatedPremium = milestone;
                isExactAnchor = true;
                break;
            }
        }

        const svgElement = document.querySelector('.chart-container svg');
        const graphWrapper = document.querySelector('.graph-wrapper');

        if (svgElement && graphWrapper) {
            if (simulatedPremium > pMid) {
                graphWrapper.classList.add('focus-growth');
                svgElement.setAttribute('viewBox', '200 20 400 200'); 
            } else {
                graphWrapper.classList.remove('focus-growth');
                svgElement.setAttribute('viewBox', '0 0 600 220'); 
            }
        }    

        let baseScenario, topScenario, proportion;

        if (simulatedPremium <= pMin) {
            baseScenario = scenarioData.sustainable70Scenario;
            topScenario = scenarioData.leastPremiumScenario;
            proportion = (pMin === pFloor) ? 0 : (simulatedPremium - pFloor) / (pMin - pFloor);
        } else if (simulatedPremium <= pMid) {
            baseScenario = scenarioData.leastPremiumScenario;
            topScenario = scenarioData.midPremiumScenario;
            proportion = (pMid === pMin) ? 0 : (simulatedPremium - pMin) / (pMid - pMin);
        } else {
            baseScenario = scenarioData.midPremiumScenario;
            topScenario = scenarioData.maxPremiumScenario;
            proportion = (pMax === pMid) ? 0 : (simulatedPremium - pMid) / (pMax - pMid);
        }

        let simulatedMilestones = [];
        for (let i = 0; i < 6; i++) {
            let v1 = baseScenario.milestones[i].accountValue;
            let v2 = topScenario.milestones[i].accountValue;
            let interpolatedValue = Math.round(v1 + proportion * (v2 - v1));
            
            simulatedMilestones.push({
                policyYear: baseScenario.milestones[i].policyYear,
                ageNext: baseScenario.milestones[i].ageNext,
                accountValue: interpolatedValue
            });
        }

        const badgePi = document.getElementById('badge-pi');
        const badgeSim = document.getElementById('badge-sim');
        
        if (badgePi) badgePi.classList.toggle('active-pi', isExactAnchor);
        if (badgeSim) badgeSim.classList.toggle('active-sim', !isExactAnchor);

        updateUIOutputs(simulatedPremium, simulatedMilestones, pMin, scenarioData);
    }

    function renderEmptyState() {
        const premiumDisplay = document.getElementById('premium-display');
        if (premiumDisplay) premiumDisplay.innerText = "Data Stream Empty";
        
        const badgePi = document.getElementById('badge-pi');
        const badgeSim = document.getElementById('badge-sim');
        if (badgePi) badgePi.classList.remove('active-pi');
        if (badgeSim) badgeSim.classList.remove('active-sim');

        for (let i = 1; i <= 5; i++) {
            const valEl = document.getElementById(`val-${i}`);
            const cardEl = document.getElementById(`card-${i}`);
            if (valEl) valEl.innerText = "RM --";
            if (cardEl) cardEl.classList.remove('unsustainable-alert');
        }
        
        const mainRibbon = document.getElementById('main-ribbon');
        const glowRibbon = document.getElementById('glow-ribbon');
        const shadowArea = document.getElementById('shadow-area');
        if (mainRibbon) mainRibbon.setAttribute('d', '');
        if (glowRibbon) glowRibbon.setAttribute('d', '');
        if (shadowArea) shadowArea.setAttribute('d', '');
    }

    function updateUIOutputs(premium, milestones, pMinBoundary, scenarioData) {
        const protectionSlider = document.getElementById('protection-slider');
        if (!protectionSlider) return;

        const currentProtection = parseInt(protectionSlider.value);
        const formattedProtection = `RM ${(currentProtection / 1000000).toFixed(1)}M`;
        
        document.getElementById('protection-display').innerText = formattedProtection;
        document.getElementById('premium-display').innerText = `RM ${premium.toLocaleString()}/yr`;

        // 1. SAFELY CLEAN & PARSE MILESTONE DATA
        const valuesList = milestones.map(m => {
            if (typeof m.accountValue === 'number') return m.accountValue;
            if (typeof m.accountValue === 'string') {
                const cleaned = m.accountValue.replace(/[^0-9.]/g, '');
                return parseFloat(cleaned) || 0;
            }
            return 0;
        });
        
        const localMax = Math.max(...valuesList, 100000);

        // 2. STABLE SYSTEM BOUNDARIES DIRECT FROM MEMORY DATA ENGINE
        let pMid = pMinBoundary || 1500;
        let pMax = premium > pMid ? premium * 1.3 : 300000;

        if (scenarioData) {
            if (scenarioData.maxPremiumScenario) pMax = scenarioData.maxPremiumScenario.premiumAmount || pMax;
            if (scenarioData.midPremiumScenario) pMid = scenarioData.midPremiumScenario.premiumAmount || pMid;
        }

        // 3. DUAL-ZONE CEILING MATH
        let yCeiling;
        const isFocusGrowth = (premium > pMid);

        if (isFocusGrowth && pMax > pMid) {
            const linearProgress = Math.min(Math.max((premium - pMid) / (pMax - pMid), 0), 1); 
            const exponentialProgress = Math.pow(linearProgress, 3);
            const dynamicBuffer = 1.25 - (exponentialProgress * 0.23); 
            yCeiling = localMax * dynamicBuffer;
        } else {
            yCeiling = localMax * 1.25; 
        }

        // 4. HIGH-DRAMA VIEWPORT GRID COORDINATES
        let xCoordinates = [40, 150, 260, 370, 480, 570]; 
        if (isFocusGrowth) {
            xCoordinates = [20, 80, 150, 260, 400, 580];
        }

        // 5. SVG GRID Y-COORDINATE PLOTTER
        function toSvgY(val) {
            const cleanVal = isNaN(val) ? 0 : val;
            return 180 - ((cleanVal / yCeiling) * 140);
        }

        const activeCoords = [];

        for (let i = 0; i < 6; i++) {
            const milestone = milestones[i];
            const value = milestone.accountValue;
            
            const axisEl = document.getElementById(`axis-${i}`);
            if (axisEl) {
                axisEl.innerText = `Age ${milestone.ageNext} (Yr ${milestone.policyYear})`;
                axisEl.setAttribute('x', xCoordinates[i]); 
            }

            if (i > 0) {
                const lblEl = document.getElementById(`lbl-${i}`);
                const valEl = document.getElementById(`val-${i}`);
                const cardEl = document.getElementById(`card-${i}`);

                if (lblEl) lblEl.innerText = `Age ${milestone.ageNext} (Policy Yr ${milestone.policyYear}) Value`;
                
                if (valEl && cardEl) {
                    if (i === 5 && premium < pMinBoundary) {
                        valEl.innerText = "Not Sustainable";
                        cardEl.classList.add('unsustainable-alert');
                    } else {
                        valEl.innerText = `RM ${value.toLocaleString()}`;
                        cardEl.classList.remove('unsustainable-alert');
                    }
                }
            }

            const cx = xCoordinates[i];
            const cy = toSvgY(value);
            const nodeEl = document.getElementById(`node-${i}`);

            if (nodeEl) {
                nodeEl.setAttribute('cx', cx);
                nodeEl.setAttribute('cy', cy);
            }
            activeCoords.push({ x: cx, y: cy });
        }

        const smoothSplinePath = getSmoothBezierPath(activeCoords);
        const mainRibbon = document.getElementById('main-ribbon');
        const glowRibbon = document.getElementById('glow-ribbon');
        const shadowArea = document.getElementById('shadow-area');
        
        if (mainRibbon) mainRibbon.setAttribute('d', smoothSplinePath);
        if (glowRibbon) glowRibbon.setAttribute('d', smoothSplinePath);
        
        if (shadowArea && activeCoords.length > 0) {
            const closedPath = `${smoothSplinePath} L ${activeCoords[activeCoords.length - 1].x} 180 L ${activeCoords[0].x} 180 Z`;
            shadowArea.setAttribute('d', closedPath);
        }

        const isDownslope = (premium < pMinBoundary);
        const gradEnd = document.getElementById('gradient-end');
        const glowGradEnd = document.getElementById('glow-gradient-end');

        if (isDownslope) {
            if (gradEnd) gradEnd.setAttribute('stop-color', 'var(--warning-glow)');
            if (glowGradEnd) glowGradEnd.setAttribute('stop-color', 'var(--warning-glow)');
            const node5 = document.getElementById(`node-5`);
            if (node5) node5.style.stroke = 'var(--neon-red)';
        } else {
            if (gradEnd) gradEnd.setAttribute('stop-color', '#00d2ff');
            if (glowGradEnd) glowGradEnd.setAttribute('stop-color', '#00d2ff');
            for (let i = 0; i < 6; i++) { 
                const nodeEl = document.getElementById(`node-${i}`);
                if (nodeEl) nodeEl.style.stroke = ''; 
            }
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        setMode('premium');
    });
</script>
